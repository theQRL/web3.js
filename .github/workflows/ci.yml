name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Check toolchain
        run: pnpm run doctor

      - name: Check repository hygiene
        run: pnpm run hygiene

      - name: Lint workspace
        run: pnpm run lint

      - name: Build packages
        run: pnpm run build

      - name: Build browser bundle
        run: pnpm run build:web

      - name: Run unit tests
        run: pnpm run test:unit

  supply-chain:
    name: Supply Chain Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit production dependency graph
        run: pnpm run audit:supply-chain

  package-inspection:
    name: Package Inspection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: pnpm run build

      - name: Build browser bundles
        run: pnpm run build:web

      - name: Inspect package tarballs
        run: pnpm run release:inspect-packages

      - name: Pack package tarballs
        run: pnpm run release:pack-packages

      - name: Smoke test package tarballs
        run: pnpm run release:smoke-tarballs dist/released-packages.tsv dist/tarballs

  coverage:
    name: Unit Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run unit coverage
        run: pnpm run test:coverage:unit

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/*/.coverage/unit/*.json,./tools/*/.coverage/unit/*.json
          disable_search: true
          flags: unit
          name: qrl-web3-unit
          fail_ci_if_error: true

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build docs
        run: pnpm run build:docs
